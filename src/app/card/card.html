<div class="card h-100 shadow-sm">
  <img [src]="item.image" class="card-img-top">

  <div class="card-body d-flex flex-column">
    <h1 class="card-title">{{ item.name }}</h1>

    <p class="card-text">
      {{ item.incrediants | slice:0:80 }}
    </p>

    <h2 class="text-muted">Reviews: {{ item.reviewCount }}</h2>
    <h2 class="text-muted">Rating: {{ item.rating }}</h2>

    <button class="btn btn-primary mt-auto" [routerLink]="['/product',item.id]">
      Recipe Details
    </button>
  </div>
</div>
